<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Counter Tool</title>

<style>

body{
margin:0;
font-family:Arial;
background:#1e1e1e;
color:white;
}

header{
background:#111;
padding:10px;
display:flex;
align-items:center;
gap:10px;
flex-wrap:wrap;
}

#tabs{
display:flex;
gap:6px;
flex-wrap:wrap;
}

.tab{
padding:6px;
border-radius:6px;
display:flex;
align-items:center;
gap:4px;
cursor:grab;
}

.tab.active{
outline:2px solid #4CAF50;
}

button{
background:#333;
border:none;
color:white;
padding:6px 8px;
border-radius:6px;
cursor:pointer;
transition:.2s;
}

button:hover{
box-shadow:0 0 10px #4CAF50;
transform:scale(1.05);
}

#counterArea{
padding:20px;
display:grid;
grid-template-columns:repeat(auto-fill,220px);
gap:15px;
}

.counter{
padding:12px;
border-radius:10px;
display:flex;
flex-direction:column;
gap:8px;
cursor:grab;
}

.counter input{
background:#111;
border:none;
color:white;
padding:4px;
}

.counter input.name{
background:transparent;
}

.counter input.value{
font-size:28px;
text-align:center;
}

.controls{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:4px;
}

.big{
font-size:18px;
font-weight:bold;
}

.addCard{
display:flex;
justify-content:center;
align-items:center;
font-size:40px;
background:#333;
border-radius:10px;
cursor:pointer;
}

.addCard:hover{
box-shadow:0 0 12px #4CAF50;
}

#settingsPanel{
position:fixed;
right:10px;
top:10px;
background:#222;
padding:15px;
border-radius:10px;
display:none;
flex-direction:column;
gap:10px;
width:200px;
}

</style>
</head>

<body>

<header>

<div id="tabs"></div>

<button onclick="toggleSettings()">⚙ Settings</button>

</header>

<div id="counterArea"></div>

<div id="settingsPanel">

<b>Font</b>
<select onchange="setFont(this.value)">
<option>Arial</option>
<option>Verdana</option>
<option>Courier New</option>
<option>Georgia</option>
<option>Trebuchet MS</option>
<option>Times New Roman</option>
</select>

<button onclick="resetCounters()">Reset Counters</button>
<button onclick="resetAll()">Reset Everything</button>

</div>

<script>

let data=JSON.parse(localStorage.getItem("counterData"))||{
tabs:[{name:"Main",color:"#333",counters:[]}],
currentTab:0
};

let dragCounter=null;
let dragTab=null;

function save(){
localStorage.setItem("counterData",JSON.stringify(data));
}

function renderTabs(){

let div=document.getElementById("tabs");
div.innerHTML="";

data.tabs.forEach((t,i)=>{

let tab=document.createElement("div");
tab.className="tab"+(i==data.currentTab?" active":"");
tab.style.background=t.color;
tab.draggable=true;

tab.innerHTML=`

<input value="${t.name}" onchange="renameTab(${i},this.value)">
<input type="color" value="${t.color}" onchange="tabColor(${i},this.value)">
<button onclick="switchTab(${i})">Open</button>
<button onclick="deleteTab(${i})">X</button>

`;

tab.ondragstart=()=>dragTab=i;

tab.ondrop=()=>{
let temp=data.tabs[dragTab];
data.tabs.splice(dragTab,1);
data.tabs.splice(i,0,temp);
render();
};

tab.ondragover=e=>e.preventDefault();

div.appendChild(tab);

});

let add=document.createElement("div");
add.className="tab";
add.innerHTML="<button onclick='addTab()'>+Tab</button>";
div.appendChild(add);

}

function renderCounters(){

let area=document.getElementById("counterArea");
area.innerHTML="";

let tab=data.tabs[data.currentTab];

tab.counters.forEach((c,i)=>{

let card=document.createElement("div");
card.className="counter";
card.style.background=c.color;
card.draggable=true;

card.innerHTML=`

<input class="name" value="${c.name}" onchange="renameCounter(${i},this.value)">

<input class="value" type="number" value="${c.value}" onchange="setValue(${i},this.value)">

<div class="controls">
<button class="big" onclick="change(${i},1)">+1</button>
<button onclick="change(${i},5)">+5</button>
<button onclick="change(${i},10)">+10</button>

<button class="big" onclick="change(${i},-1)">-1</button>
<button onclick="change(${i},-5)">-5</button>
<button onclick="change(${i},-10)">-10</button>
</div>

<input type="color" value="${c.color}" onchange="counterColor(${i},this.value)">

<button onclick="resetCounter(${i})">Reset</button>
<button onclick="deleteCounter(${i})">Delete</button>

`;

card.ondragstart=()=>dragCounter=i;

card.ondrop=()=>{
let temp=tab.counters[dragCounter];
tab.counters.splice(dragCounter,1);
tab.counters.splice(i,0,temp);
render();
};

card.ondragover=e=>e.preventDefault();

area.appendChild(card);

});

let add=document.createElement("div");
add.className="addCard";
add.innerHTML="+";
add.onclick=addCounter;
area.appendChild(add);

}

function render(){
renderTabs();
renderCounters();
save();
}

function switchTab(i){
data.currentTab=i;
render();
}

function addTab(){
data.tabs.push({name:"New Tab",color:"#333",counters:[]});
render();
}

function deleteTab(i){
if(data.tabs.length==1)return;
data.tabs.splice(i,1);
data.currentTab=0;
render();
}

function renameTab(i,name){
data.tabs[i].name=name;
save();
}

function tabColor(i,color){
data.tabs[i].color=color;
render();
}

function addCounter(){
data.tabs[data.currentTab].counters.push({
name:"Counter",
value:0,
color:"#2b2b2b"
});
render();
}

function renameCounter(i,name){
data.tabs[data.currentTab].counters[i].name=name;
save();
}

function setValue(i,val){
data.tabs[data.currentTab].counters[i].value=parseInt(val)||0;
save();
}

function change(i,amt){
data.tabs[data.currentTab].counters[i].value+=amt;
render();
}

function counterColor(i,color){
data.tabs[data.currentTab].counters[i].color=color;
render();
}

function resetCounter(i){
data.tabs[data.currentTab].counters[i].value=0;
render();
}

function deleteCounter(i){
data.tabs[data.currentTab].counters.splice(i,1);
render();
}

function toggleSettings(){
let s=document.getElementById("settingsPanel");
s.style.display=s.style.display=="flex"?"none":"flex";
}

function setFont(f){
document.body.style.fontFamily=f;
}

function resetCounters(){
data.tabs.forEach(t=>{
t.counters.forEach(c=>c.value=0);
});
render();
}

function resetAll(){
localStorage.removeItem("counterData");
location.reload();
}

render();

</script>

</body>
</html>

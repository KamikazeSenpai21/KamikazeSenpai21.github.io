<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Random Tools</title>

<style>

body {
    background: #1b0033; /* dark purple */
    font-family: Arial, sans-serif;
    text-align: center;
    margin: 0;
    padding: 0;
}

.container {
    margin-top: 120px;
}

h1 {
    color: white;
    font-size: 64px;
    margin-bottom: 60px;
}

/* BUTTON STYLE */

button {
    display: block;
    margin: 15px auto;
    padding: 12px 26px;
    font-size: 18px;
    background-color: #ffd84d;
    color: black;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    width: 220px;

    /* glow */
    box-shadow: 0 0 10px #ffd84d;

    transition: 
        transform 0.2s,
        box-shadow 0.2s,
        background-color 0.2s;
}

button:hover {
    background-color: #ffea80;

    /* stronger glow */
    box-shadow: 
        0 0 10px #ffd84d,
        0 0 20px #ffd84d,
        0 0 40px #ffd84d;

    transform: translateY(-3px) scale(1.05);
}

</style>
</head>

<body>

<div class="container">

<h1>Random Tools</h1>

<button onclick="location.href='checklist.html'">
Fusion Checklist
</button>

<button onclick="location.href='inversechart.html'">
Inverse Type Chart
</button>

<button onclick="location.href='counter.html'">
Ultimate Counter Tool
</button>

<button onclick="location.href='about.html'">
About
</button>

</div>

</body>
</html>
